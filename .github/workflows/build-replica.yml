name: Build Replica

on:
  workflow_dispatch:
    inputs:
      replica_name:
        description: Replica package name to build and publish
        required: true
        type: string

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Validate replica input
        run: |
          set -euo pipefail
          replica="${{ inputs.replica_name }}"
          if [[ ! "$replica" =~ ^[a-z0-9-]+$ ]]; then
            echo "Invalid replica name: $replica"
            exit 1
          fi
          if [[ ! -f "replicas/$replica/package.json" ]]; then
            echo "Replica package not found: replicas/$replica/package.json"
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Expose GitHub Actions cache runtime
        uses: crazy-max/ghaction-github-runtime@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push replica image
        run: |
          set -euo pipefail
          cd "replicas/${{ inputs.replica_name }}"
          bun ../../apps/cli/src/main.ts build --push
