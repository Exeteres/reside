name: Pull Request Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  ci-check:
    name: ci:check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ci:check
        run: bun run ci:check
