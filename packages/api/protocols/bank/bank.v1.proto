syntax = "proto3";

package reside.bank.v1;

import "google/protobuf/empty.proto";

// A bank ledger transaction visible through the public API.
message Transaction {
  string id = 1;
  TransactionKind kind = 2;
  optional string sender_subject_id = 3;
  string recipient_subject_id = 4;
  string amount = 5;
  optional string comment = 6;
  string created_at = 7;
}

enum TransactionKind {
  TRANSACTION_KIND_UNSPECIFIED = 0;
  ISSUE = 1;
  TRANSFER = 2;
}

message GetBalanceResponse {
  string balance = 1;
}

message ListTransactionsRequest {
  uint32 page_size = 1;
  optional string page_token = 2;
}

message ListTransactionsResponse {
  repeated Transaction transactions = 1;
  optional string next_page_token = 2;
}

message TransferRequest {
  string recipient_subject_id = 1;
  string amount = 2;
  string idempotency_key = 3;
  // Plaintext comment for the recipient-facing transaction.
  // The bank replica encrypts this value before storing it and never returns it as plaintext.
  optional string comment = 4;
}

message TransferResponse {
  Transaction transaction = 1;
}

// The synchronous bank API for replicas.
service BankService {
  // Gets the authenticated replica subject balance and lazily creates an account when it is missing.
  rpc GetBalance(google.protobuf.Empty) returns (GetBalanceResponse);

  // Lists transactions for the authenticated replica subject with cursor pagination.
  rpc ListTransactions(ListTransactionsRequest) returns (ListTransactionsResponse);

  // Transfers funds from the authenticated replica subject.
  // Reusing the same idempotency key returns the original transaction without applying balance changes again.
  rpc Transfer(TransferRequest) returns (TransferResponse);
}
