syntax = "proto3";

package reside.alpha.load.v1;

import "common/operation.v1.proto";

// The request message to load the new replica in the cluster or update the existing one.
message LoadReplicaRequest {
  // The name of the replica to load or update.
  string name = 1;

  // The image of the replica.
  string image = 2;
}

// The service that must be used to initiate loading of a new replica or update the existing one in the cluster.
service LoadService {
  // Requests the Alpha Replica to load a new replica or update the existing one in the cluster.
  rpc LoadReplica(LoadReplicaRequest) returns (LoadReplicaResponse);
}

// The response message for initiating replica loading.
message LoadReplicaResponse {
  // The operation tracking CRD reconciliation and readiness.
  reside.common.operation.v1.Operation operation = 1;
}
