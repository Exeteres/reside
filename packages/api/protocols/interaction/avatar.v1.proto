syntax = "proto3";

package reside.interaction.avatar.v1;

import "common/operation.v1.proto";
import "google/protobuf/empty.proto";

// The request message for ensuring that the caller replica has its managed avatar bot configured.
message EnsureAvatarRequest {
  // The localized replica title to be shown in avatar provisioning prompts.
  string replica_title = 1;
}

// The response message for EnsureAvatarRequest.
message EnsureAvatarResponse {
  // The optional operation representing asynchronous avatar provisioning.
  // Omitted when avatar already exists.
  reside.common.operation.v1.Operation operation = 1;
}

// The request message for updating managed avatar version tag in system chat.
message UpdateAvatarVersionRequest {
  // The target replica technical name.
  string replica_name = 1;

  // The new replica version to publish in avatar admin tag.
  string new_version = 2;
}

// The request message for getting a Telegram chat title through caller replica avatar bot.
message GetAvatarChatTitleRequest {
  // The opaque interaction context token identifying the Telegram chat.
  string context_token = 1;
}

// The response message containing a Telegram chat title.
message GetAvatarChatTitleResponse {
  // The current human-readable Telegram chat title.
  string title = 1;
}

// The request message for updating a Telegram chat title through caller replica avatar bot.
message UpdateAvatarChatTitleRequest {
  // The opaque interaction context token identifying the Telegram chat.
  string context_token = 1;

  // The new human-readable Telegram chat title.
  string title = 2;
}

// The avatar service for managed bot provisioning.
service AvatarService {
  // Ensures a managed avatar bot exists for the caller replica.
  rpc EnsureAvatar(EnsureAvatarRequest) returns (EnsureAvatarResponse);

  // Updates managed avatar bot admin tag in system chat for the given replica.
  rpc UpdateAvatarVersion(UpdateAvatarVersionRequest) returns (google.protobuf.Empty);

  // Gets the title of the Telegram chat identified by the interaction context token using the caller replica avatar bot.
  rpc GetAvatarChatTitle(GetAvatarChatTitleRequest) returns (GetAvatarChatTitleResponse);

  // Updates the title of the Telegram chat identified by the interaction context token using the caller replica avatar bot.
  rpc UpdateAvatarChatTitle(UpdateAvatarChatTitleRequest) returns (google.protobuf.Empty);
}
