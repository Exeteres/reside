syntax = "proto3";

package reside.interaction.nls.v1;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

// Request for asking the replica natural language subsystem.
message AskRequest {
  // The text prompt to send to the replica.
  string text = 1;

  // Optional subject identifier that should be used as the caller subject.
  // If omitted, the authenticated requester subject is used.
  google.protobuf.StringValue subject_id = 2;

  // The information about the subject that should be included in the request context.
  // This is used by the replica to personalize responses based on the subject's attributes.
  map<string, string> subject_info = 3; 

  // Optional conversation session reference.
  // If omitted, the replica starts a new session.
  oneof session_reference {
    // Opaque session identifier that must be continued explicitly.
    string session_id = 4;

    // Opaque previous session identifier that the replica may continue when the prompt needs context.
    string last_session_id = 5;
  }
}

// Response from the natural language subsystem.
message AskResponse {
  // The plain text answer generated by the target replica.
  string text = 1;

  // Opaque identifier of the created or continued session.
  string session_id = 2;
}

// Streaming response frame from the natural language subsystem.
message AskStreamResponse {
  // The full current text for this frame.
  // Consumers should replace previously rendered text with this value.
  string text = 1;

  // Whether this frame starts a new assistant message and resets previous output.
  // This is useful when the agent emits a new final message after tool calls.
  bool reset = 2;

  // Opaque identifier of the created or continued session.
  // The first stream frame should include this as soon as the session is resolved.
  string session_id = 3;
}

// Request for clearing persisted natural language context for a subject.
message ClearSubjectContextRequest {
  // The subject identifier whose conversation context must be cleared.
  string subject_id = 1;
}

// The service implemented by replicas to provide natural language interactions.
service NaturalLanguageService {
  // Asks the target replica and returns a plain text answer.
  rpc Ask(AskRequest) returns (AskResponse);

  // Asks the target replica and streams full-message frames while response is being generated.
  rpc AskStream(AskRequest) returns (stream AskStreamResponse);

  // Clears persisted conversation context for the requested subject.
  rpc ClearSubjectContext(ClearSubjectContextRequest) returns (google.protobuf.Empty);
}
