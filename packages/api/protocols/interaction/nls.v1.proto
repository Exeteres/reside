syntax = "proto3";

package reside.interaction.nls.v1;

import "google/protobuf/wrappers.proto";

// Request for asking the replica natural language subsystem.
message AskRequest {
  // The text prompt to send to the replica.
  string text = 1;

  // Optional subject identifier that should be used as the caller subject.
  // If omitted, the authenticated requester subject is used.
  google.protobuf.StringValue subject_id = 2;
}

// Response from the natural language subsystem.
message AskResponse {
  // The plain text answer generated by the target replica.
  string text = 1;
}

// The service implemented by replicas to provide natural language interactions.
service NaturalLanguageService {
  // Asks the target replica and returns a plain text answer.
  rpc Ask(AskRequest) returns (AskResponse);
}
