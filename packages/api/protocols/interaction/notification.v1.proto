syntax = "proto3";

package reside.interaction.notification.v1;

import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";
import "common/file.v1.proto";
import "common/operation.v1.proto";

// The well-known icon to be displayed alongside a notification action.
enum NotificationActionIcon {
  CONFIRMATION_ACTION_ICON_NONE  = 0;
  CONFIRMATION_ACTION_ICON_CHECK = 1;
  CONFIRMATION_ACTION_ICON_CROSS = 2;
}

// The high-level notification lifecycle status used by renderers.
enum NotificationStatus {
  // The notification has no special lifecycle state.
  NOTIFICATION_STATUS_REGULAR = 0;

  // The notification is collecting or showing a planned task list.
  NOTIFICATION_STATUS_PLANNING = 1;

  // The notification is actively in progress.
  NOTIFICATION_STATUS_IN_PROGRESS = 2;

  // The notification completed successfully.
  NOTIFICATION_STATUS_COMPLETED = 3;

  // The notification failed.
  NOTIFICATION_STATUS_FAILED = 4;
}

// The status of a task attached to a notification.
enum NotificationTaskStatus {
  // The task is planned but has not started yet.
  NOTIFICATION_TASK_STATUS_PLANNED = 0;

  // The task is waiting to start.
  NOTIFICATION_TASK_STATUS_PENDING = 1;

  // The task is currently in progress.
  NOTIFICATION_TASK_STATUS_IN_PROGRESS = 2;

  // The task completed successfully.
  NOTIFICATION_TASK_STATUS_COMPLETED = 3;

  // The task failed.
  NOTIFICATION_TASK_STATUS_FAILED = 4;

  // The task was skipped and should not be performed.
  NOTIFICATION_TASK_STATUS_SKIPPED = 5;
}

// The action that a user can take in response to a notification, represented by a button in the UI.
message NotificationAction {
  // The unique name of the action within the notification, used to identify which action was taken by the user in the response.
  string name = 1;

  // The human-readable title of the action, displayed on the button in the UI.
  string title = 2;

  // The optional well-known icon to be displayed alongside the action in the UI, used to visually convey the purpose of the action.
  NotificationActionIcon icon = 3;

  // The optional URL of the action to redirect the user.
  // If provided, no callback will be triggered.
  google.protobuf.StringValue url = 4;
}

// The row of actions in a notification.
message NotificationActionRow {
  // The list of actions to be displayed in the same row in the UI.
  repeated NotificationAction actions = 1;
}

// A task attached to a notification task group.
message NotificationTask {
  // The caller-provided stable task identifier within its group.
  string id = 1;

  // The human-readable task title.
  string title = 2;

  // The current task status.
  NotificationTaskStatus status = 3;
}

// A single-level group of tasks attached to a notification.
message NotificationTaskGroup {
  // The caller-provided stable group identifier within the notification.
  string id = 1;

  // The human-readable group title.
  string title = 2;

  // The ordered list of tasks in this group.
  repeated NotificationTask tasks = 3;
}

// A dice response emitted by an interaction implementation.
message DiceResponse {
  // The dice emoji accepted by the interaction implementation.
  string emoji = 1;

  // The resulting dice value.
  // The value range depends on the emoji and the interaction implementation.
  uint32 value = 2;
}

// The read model of a notification as currently stored by the interaction implementation.
message Notification {
  // The identifier of the notification.
  // This ID is opaque and must not be parsed.
  string notification_id = 1;

  // The stored notification title.
  string title = 2;

  // The stored notification content.
  string content = 3;

  // The current notification lifecycle status.
  NotificationStatus status = 4;

  // The current action rows available to the user.
  repeated NotificationActionRow action_rows = 5;

  // The current ordered task groups attached to the notification.
  repeated NotificationTaskGroup task_groups = 6;

  // Whether the notification currently accepts text responses.
  bool requires_text_response = 7;

  // Whether response interaction with this notification is protected by permissions.
  bool protected = 8;

  // Whether callback interactions should avoid delayed "chosen" suffix rendering.
  bool expect_immediate_feedback = 9;

  // Whether messages sent into the target topic are treated as text responses to this notification.
  bool acquire_topic = 10;

  // Dice emojis accepted as responses to this notification.
  // Empty means dice responses are not accepted.
  repeated string accepted_dice_emojis = 11;

  // Optional canonical subject identifier allowed to respond to this notification.
  // If provided, implementations must reject responses from other subjects.
  google.protobuf.StringValue protected_for_subject_id = 12;
}

// The request message for sending a notification to a channel.
message SendNotificationRequest {
  // The optional interaction context token to send the notification in response to.
  // This token is opaque and must not be parsed.
  // If omitted, the notification is sent to the system chat.
  optional string context_token = 1;

  // The channel to send the notification to.
  // Required unless `topic_id` is provided.
  // When `topic_id` is provided without a channel, implementations must derive the channel from the topic.
  string channel = 2;

  // The name of the partition inside the channel to send the notification to.
  // If not provided, the notification will be sent to the default partition.
  // The partition is used to scope notifications within a channel for some specific entity.
  // Partitions can be muted independently by the user, so they can be used to avoid sending notifications about some entities that the user is not interested in.
  google.protobuf.StringValue partition = 3;

  // The human-readable title of the notification.
  string title = 4;

  // The optional notification content.
  google.protobuf.StringValue content = 5;

  // The optinal list of images to be displayed in the notification.
  repeated reside.common.file.v1.InlineFile images = 6;

  // The optional list of files to be attached to the notification.
  // Unlike images, these files are not actively displayed in the notification, but can be accessed by the user in some other way.
  repeated reside.common.file.v1.InlineFile attachments = 7;

  // The optional list of action rows that the user can take in response to the notification.
  // If provided with `requires_text_response` set to true, the user will have choice to either click one of the provided actions or provide a text response.
  // If all actions are "url-based", no response will be tracked.
  repeated NotificationActionRow action_rows = 8;

  // Whether the notification needs (or may) text input from the user in response.
  // If not true, the response to the notification will not be tracked and no operation will be created to await it.
  google.protobuf.BoolValue requires_text_response = 9;

  // Whether response interaction with this notification is protected by permissions.
  // If false (default), any user can interact with notification responses.
  // If true, the interaction implementation may enforce additional authorization checks before accepting responses.
  google.protobuf.BoolValue protected = 10;

  // Optional subject identifier to send notification on behalf of.
  // If not provided, the notification is sent on behalf of the calling replica subject.
  // Implementations may require additional permission checks to allow impersonation.
  google.protobuf.StringValue send_as_subject_id = 11;

  // Whether callback interactions should avoid delayed "chosen" suffix rendering.
  // Useful for interactions where immediate in-place UI updates are expected.
  google.protobuf.BoolValue expect_immediate_feedback = 12;

  // The optional notification topic to send the notification into.
  // This ID is opaque and must not be parsed.
  // When this field is used as the routing source, callers must not provide interaction context routing details.
  google.protobuf.StringValue topic_id = 13;

  // Whether messages sent into the target topic should be treated as text responses to this notification.
  // Implementations must authorize topic messages before resolving the notification response.
  google.protobuf.BoolValue acquire_topic = 14;

  // The notification lifecycle status used by renderers.
  // If omitted, implementations must treat the notification as regular.
  NotificationStatus status = 15;

  // The ordered task groups attached to the notification.
  // Planning notifications must include at least one group with at least one task, and all tasks must be planned or skipped.
  repeated NotificationTaskGroup task_groups = 16;

  // Dice emojis accepted as notification responses.
  // Empty means dice responses are not accepted.
  repeated string accepted_dice_emojis = 17;

  // Optional canonical subject identifier allowed to respond to this notification.
  // If provided, implementations must reject responses from other subjects.
  google.protobuf.StringValue protected_for_subject_id = 18;

  // Optional platform-specific sticker file identifier to send after the notification text.
  // Interaction implementations that do not support stickers may ignore this field.
  google.protobuf.StringValue sticker_file_id = 19;
}

// The response message for a notification sent to a channel.
message SendNotificationResponse {
  // The identifier of the created notification.
  // This ID is opaque and must not be parsed.
  string notification_id = 2;

  // The optional operation representing the pending response to the notification.
  // If the notification has no actions and does not set `requires_text_response` to true, this will be null, as there is no response to await.
  // Once user takes an action or provides a text response, the operation will be resolved with the NotificationResponse message.
  reside.common.operation.v1.Operation operation = 1;

  // The optional external link to the created notification message.
  // This link is intended for display to the caller and must not be parsed.
  google.protobuf.StringValue message_link = 3;

  // The created notification read model.
  Notification notification = 4;
}

// The request message for updating an existing notification.
message UpdateNotificationRequest {
  // The identifier of the notification to update.
  // This ID is opaque and must not be parsed.
  string notification_id = 1;

  // The updated notification title.
  string title = 2;

  // The updated notification content.
  string content = 3;

  // The updated list of action rows available to the user.
  repeated NotificationActionRow action_rows = 4;

  // The updated text response requirement.
  // If not provided, the current requirement is preserved.
  google.protobuf.BoolValue requires_text_response = 5;

  // Whether callback interactions should avoid delayed "chosen" suffix rendering.
  // If not provided, the current behavior is preserved.
  google.protobuf.BoolValue expect_immediate_feedback = 6;

  // The updated notification lifecycle status used by renderers.
  // If omitted, implementations must treat the notification as regular.
  NotificationStatus status = 7;

  // The updated ordered task groups attached to the notification.
  // This field replaces the full task list.
  // Planning notifications must include at least one group with at least one task, and all tasks must be planned or skipped.
  repeated NotificationTaskGroup task_groups = 8;

  // The updated dice emojis accepted as notification responses.
  // Empty means dice responses are not accepted.
  repeated string accepted_dice_emojis = 9;

  // Whether messages sent into the target topic should be treated as responses to this notification.
  // If not provided, the current behavior is preserved.
  google.protobuf.BoolValue acquire_topic = 10;

  // Optional canonical subject identifier allowed to respond to this notification.
  // If not provided, the current restriction is preserved.
  google.protobuf.StringValue protected_for_subject_id = 11;
}

// The response message for a notification update operation.
message UpdateNotificationResponse {
  // The optional operation representing the pending response to the updated notification.
  // If no response tracking is required after update, this will be null.
  reside.common.operation.v1.Operation operation = 1;

  // The updated notification read model.
  Notification notification = 2;
}

// The request message for accepting more responses for an existing notification.
message AcceptNotificationResponseRequest {
  // The identifier of the notification to accept responses for.
  // This ID is opaque and must not be parsed.
  string notification_id = 1;
}

// The response message for accepting more responses for an existing notification.
message AcceptNotificationResponseResponse {
  // The pending operation representing the next response to the notification.
  // If a pending response operation already exists for the notification, that operation is returned.
  reside.common.operation.v1.Operation operation = 1;

  // The notification read model at the time response acceptance was requested.
  Notification notification = 2;
}

// The request message for deleting an existing notification.
message DeleteNotificationRequest {
  // The identifier of the notification to delete.
  // This ID is opaque and must not be parsed.
  string notification_id = 1;
}

// The message representing the user's response to a notification, either by taking one of the provided actions or by providing a text response.
message NotificationResponse {
  oneof response {
    // The name of the action taken by the user, if the user responded by taking one of the provided actions.
    string action_name = 1;

    // The text response provided by the user, if `requires_text_response` was set to true and the user responded by providing a text response instead of taking one of the provided actions.
    string text_response = 2;

    // Indicates that the user updated the notification task list through an implementation-specific task editing interaction.
    google.protobuf.Empty task_update = 4;

    // A dice response emitted by an interaction implementation.
    DiceResponse dice_response = 6;
  }

  // The notification read model at the moment the response operation was resolved.
  Notification notification = 3;

  // The canonical subject identifier of the user who responded.
  // This value identifies the actor in the interaction implementation's subject namespace and must not expose external platform IDs.
  google.protobuf.StringValue subject_id = 5;
}

// The notification service, which allows sending notifications to users and receiving their responses.
service NotificationService {
  // Sends a notification to a channel.
  rpc SendNotification(SendNotificationRequest) returns (SendNotificationResponse);

  // Updates title and content of an existing notification.
  rpc UpdateNotification(UpdateNotificationRequest) returns (UpdateNotificationResponse);

  // Accepts the next response for an existing interactive notification.
  // This call is idempotent while a pending response operation already exists.
  rpc AcceptNotificationResponse(AcceptNotificationResponseRequest) returns (AcceptNotificationResponseResponse);

  // Deletes an existing notification.
  rpc DeleteNotification(DeleteNotificationRequest) returns (google.protobuf.Empty);
}
