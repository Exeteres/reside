syntax = "proto3";

package reside.infra.gateway.v1;

import "google/protobuf/empty.proto";
import "common/operation.v1.proto";

// The request for registering a gateway for the replica.
message EnsureGatewayRequest {
  // The unique name of the gateway.
  // The final FQDN will be {name}.{cluster_domain}.
  // The name must be a valid DNS label.
  string name = 1;

  // The human-readable title of the gateway to be shown in the UI.
  string title = 2;

  // The optional description of the gateway to be shown in the UI.
  string description = 3;
}

// The operation result payload for EnsureGateway.
message EnsureGatewayResult {
  // The resolved gateway endpoint.
  string endpoint = 1;
}

// The response for registering a gateway for the replica.
message EnsureGatewayResponse {
  // The response may contain either an immediate result or an operation.
  // The result of the operation, once completed, will be EnsureGatewayResult.
  // Clients should poll the operation using reside.common.operation.v1.OperationService.
  oneof response {
    EnsureGatewayResult                  result    = 1;
    reside.common.operation.v1.Operation operation = 2;
  }
}

// The service for managing infrastructure-related definitions in the system, such as gateways.
service GatewayService {
  // Ensures that the gateway exists and ready for use.
  rpc EnsureGateway(EnsureGatewayRequest) returns (EnsureGatewayResponse);
}
